<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Video Call - Simple</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Video Call P2P</h1>
        
        <div class="status-box">
            <p>ID của bạn: <strong id="my-id">Đang khởi tạo...</strong></p>
            <input type="text" id="peer-id-input" placeholder="Nhập ID đối phương">
            <button id="btn-call">📞 Gọi ngay</button>
        </div>

        <div class="video-grid">
            <div class="video-wrapper">
                <span>Bạn</span>
                <video id="local-video" autoplay muted playsinline></video>
            </div>
            <div class="video-wrapper">
                <span>Đối phương</span>
                <video id="remote-video" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
